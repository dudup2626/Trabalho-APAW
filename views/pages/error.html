<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - StickerSwap 2026</title>
  <meta name="description" content="An unexpected error occurred. Please try again.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="error-page">
    <!-- Illustration -->
    <svg width="280" height="240" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: var(--space-xl);">
      <!-- Background circle -->
      <circle cx="200" cy="160" r="130" fill="#f5f5f5"/>
      
      <!-- Warning triangle -->
      <path d="M200 60 L340 280 H60 L200 60 Z" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
      <text x="200" y="220" text-anchor="middle" fill="#d97706" font-size="80" font-weight="bold">!</text>
      
      <!-- Decorative elements -->
      <circle cx="60" cy="80" r="30" fill="#ff4d00" fill-opacity="0.1"/>
      <circle cx="350" cy="120" r="20" fill="#00c2ff" fill-opacity="0.1"/>
      <circle cx="320" cy="260" r="35" fill="#00d26a" fill-opacity="0.1"/>
      
      <!-- Broken connection lines -->
      <line x1="80" y1="200" x2="120" y2="200" stroke="#ddd" stroke-width="3" stroke-dasharray="8 4"/>
      <line x1="280" y1="200" x2="320" y2="200" stroke="#ddd" stroke-width="3" stroke-dasharray="8 4"/>
      
      <!-- Server/error icons -->
      <rect x="90" y="140" width="40" height="50" rx="4" fill="#e5e5e5" stroke="#ccc" stroke-width="2"/>
      <circle cx="100" cy="155" r="3" fill="#ff4444"/>
      <circle cx="110" cy="155" r="3" fill="#ffd000"/>
      <circle cx="120" cy="155" r="3" fill="#00d26a"/>
      <line x1="95" y1="170" x2="125" y2="170" stroke="#ccc" stroke-width="2"/>
      <line x1="95" y1="180" x2="115" y2="180" stroke="#ccc" stroke-width="2"/>
      
      <rect x="270" y="140" width="40" height="50" rx="4" fill="#e5e5e5" stroke="#ccc" stroke-width="2"/>
      <circle cx="280" cy="155" r="3" fill="#ff4444"/>
      <circle cx="290" cy="155" r="3" fill="#ffd000"/>
      <circle cx="300" cy="155" r="3" fill="#00d26a"/>
    </svg>
    
    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-description">
      We encountered an unexpected error while processing your request. 
      Don't worry, our team has been notified and we're working on a fix.
    </p>
    
    <div style="display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center;">
      <button onclick="window.location.reload()" class="btn btn-primary btn-lg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Try Again
      </button>
      <a href="/" class="btn btn-secondary btn-lg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Go Home
      </a>
    </div>
    
    <!-- Support Section -->
    <div style="margin-top: var(--space-3xl); padding: var(--space-xl); background: var(--color-light-gray); border-radius: var(--radius-xl); max-width: 480px;">
      <h3 style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--color-black); margin-bottom: var(--space-sm);">Need Help?</h3>
      <p style="color: var(--color-dark-gray); margin-bottom: var(--space-md);">
        If this error persists, please contact our support team.
      </p>
      <div style="display: flex; gap: var(--space-md); justify-content: center;">
        <a href="mailto:support@stickerswap2026.com" class="btn btn-sm btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Email Support
        </a>
        <a href="/contact.html" class="btn btn-sm btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
          Contact Us
        </a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
