<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Sticker - StickerSwap 2026</title>
  <meta name="description" content="Add a new sticker to your FIFA World Cup 2026 collection.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/" class="navbar-logo">
        <div class="navbar-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
        </div>
        StickerSwap 2026
      </a>
      
      <div class="navbar-nav">
        <a href="/dashboard.html" class="navbar-link">Dashboard</a>
        <a href="/album.html" class="navbar-link">My Album</a>
        <a href="/trades.html" class="navbar-link">Find Trades</a>
        <a href="/catalog.html" class="navbar-link">Catalog</a>
      </div>
      
      <div class="navbar-actions">
        <a href="/profile.html" class="btn btn-ghost">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
        <button class="btn btn-secondary" onclick="StickerSwap.Auth.logout()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
      
      <button class="navbar-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <div class="page-header-content">
        <div>
          <h1 class="page-header-title">Add Sticker</h1>
          <p class="page-header-description">Add a new sticker to your collection</p>
        </div>
        <div class="page-header-actions">
          <a href="/album.html" class="btn btn-secondary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to Album
          </a>
        </div>
      </div>
    </div>
  </div>

  <main class="section" style="padding-top: var(--space-xl);">
    <div class="container container-narrow">
      <div class="card">
        <form id="addStickerForm">
          <!-- Sticker Selection -->
          <div class="form-group">
            <label class="form-label form-label-required">Select Sticker</label>
            <div class="search-input">
              <svg class="search-input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input 
                type="text" 
                class="form-input" 
                id="stickerSearch"
                placeholder="Search by number, player name, or country..."
                autocomplete="off"
              >
            </div>
            <p class="form-hint">Type to search from the official FIFA World Cup 2026 catalog</p>
            
            <!-- Search Results Dropdown -->
            <div id="searchResults" style="display: none; margin-top: var(--space-sm); background: var(--color-white); border: 1px solid var(--color-light-gray); border-radius: var(--radius-lg); max-height: 240px; overflow-y: auto; box-shadow: var(--shadow-lg);"></div>
          </div>

          <!-- Selected Sticker Preview -->
          <div id="selectedSticker" class="hidden" style="background: var(--color-light-gray); border-radius: var(--radius-lg); padding: var(--space-lg); margin-bottom: var(--space-xl);">
            <div style="display: flex; gap: var(--space-lg); align-items: center;">
              <div style="width: 80px; height: 100px; background: var(--color-white); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-dark-gray);">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="12" cy="12" r="4"/>
                </svg>
              </div>
              <div style="flex: 1;">
                <div style="font-size: var(--text-xs); font-weight: var(--font-bold); color: var(--color-primary); text-transform: uppercase; letter-spacing: 0.05em;" id="previewNumber"></div>
                <div style="font-size: var(--text-lg); font-weight: var(--font-semibold); color: var(--color-black); margin-top: var(--space-xs);" id="previewName"></div>
                <div style="font-size: var(--text-base); color: var(--color-dark-gray);" id="previewTeam"></div>
                <div style="margin-top: var(--space-sm);" id="previewRarity"></div>
              </div>
            </div>
            <input type="hidden" id="selectedStickerId">
            <input type="hidden" id="selectedNumber">
            <input type="hidden" id="selectedName">
            <input type="hidden" id="selectedTeam">
            <input type="hidden" id="selectedRarity">
          </div>

          <!-- Sticker Type -->
          <div class="form-group">
            <label class="form-label form-label-required">Sticker Type</label>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-md);">
              <label style="cursor: pointer;">
                <input type="radio" name="type" value="duplicate" style="display: none;" checked onchange="toggleQuantityField()">
                <div id="duplicateOption" style="padding: var(--space-lg); border: 2px solid var(--color-primary); border-radius: var(--radius-lg); text-align: center; transition: all var(--transition-fast);">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--color-primary); margin: 0 auto var(--space-sm);">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9h18"/>
                  </svg>
                  <div style="font-weight: var(--font-semibold); color: var(--color-black);">Duplicate</div>
                  <div style="font-size: var(--text-sm); color: var(--color-dark-gray);">I have extra to trade</div>
                </div>
              </label>
              <label style="cursor: pointer;">
                <input type="radio" name="type" value="missing" style="display: none;" onchange="toggleQuantityField()">
                <div id="missingOption" style="padding: var(--space-lg); border: 2px solid #e5e5e5; border-radius: var(--radius-lg); text-align: center; transition: all var(--transition-fast);">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--color-dark-gray); margin: 0 auto var(--space-sm);">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M9 3v18"/>
                  </svg>
                  <div style="font-weight: var(--font-semibold); color: var(--color-black);">Missing</div>
                  <div style="font-size: var(--text-sm); color: var(--color-dark-gray);">I'm looking for this</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Quantity (for duplicates) -->
          <div class="form-group" id="quantityField">
            <label class="form-label form-label-required" for="quantity">Quantity</label>
            <input 
              type="number" 
              id="quantity" 
              name="quantity" 
              class="form-input" 
              min="1" 
              value="1"
              required
            >
            <p class="form-hint">How many duplicates do you have?</p>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label" for="notes">Notes (Optional)</label>
            <textarea 
              id="notes" 
              name="notes" 
              class="form-textarea" 
              rows="3"
              placeholder="Any additional details about this sticker..."
            ></textarea>
          </div>

          <!-- Actions -->
          <div style="display: flex; gap: var(--space-md);">
            <a href="/album.html" class="btn btn-secondary" style="flex: 1;">Cancel</a>
            <button type="submit" class="btn btn-primary btn-lg" style="flex: 2;" id="submitBtn">
              Add Sticker
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    // Check authentication
    if (!StickerSwap.Auth.isLoggedIn()) {
      window.location.href = '/login.html';
    }

    // Toggle quantity field based on type
    function toggleQuantityField() {
      const type = document.querySelector('input[name="type"]:checked').value;
      const quantityField = document.getElementById('quantityField');
      const duplicateOption = document.getElementById('duplicateOption');
      const missingOption = document.getElementById('missingOption');
      
      if (type === 'duplicate') {
        quantityField.style.display = 'block';
        duplicateOption.style.borderColor = 'var(--color-primary)';
        duplicateOption.querySelector('svg').style.color = 'var(--color-primary)';
        missingOption.style.borderColor = '#e5e5e5';
        missingOption.querySelector('svg').style.color = 'var(--color-dark-gray)';
      } else {
        quantityField.style.display = 'none';
        missingOption.style.borderColor = 'var(--color-primary)';
        missingOption.querySelector('svg').style.color = 'var(--color-primary)';
        duplicateOption.style.borderColor = '#e5e5e5';
        duplicateOption.querySelector('svg').style.color = 'var(--color-dark-gray)';
      }
    }

    // Sticker search
    const stickerSearch = document.getElementById('stickerSearch');
    const searchResults = document.getElementById('searchResults');
    let catalogData = [];

    // Load catalog data
    async function loadCatalog() {
      catalogData = await StickerSwap.API.getCatalog();
    }

    stickerSearch.addEventListener('input', debounce((e) => {
      const query = e.target.value.toLowerCase();
      if (query.length < 2) {
        searchResults.style.display = 'none';
        return;
      }

      const matches = catalogData.filter(s => 
        s.number.toLowerCase().includes(query) ||
        s.name.toLowerCase().includes(query) ||
        s.team.toLowerCase().includes(query)
      ).slice(0, 5);

      if (matches.length > 0) {
        searchResults.innerHTML = matches.map(s => `
          <div class="search-result-item" style="padding: var(--space-md); cursor: pointer; border-bottom: 1px solid var(--color-light-gray); transition: background var(--transition-fast);" 
               onmouseover="this.style.background='var(--color-light-gray)'" 
               onmouseout="this.style.background='transparent'"
               onclick="selectSticker(${s.id})">
            <div style="display: flex; align-items: center; gap: var(--space-md);">
              <div style="width: 40px; height: 50px; background: var(--color-light-gray); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-dark-gray);">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                </svg>
              </div>
              <div style="flex: 1;">
                <div style="font-weight: var(--font-semibold); color: var(--color-black);">${s.name}</div>
                <div style="font-size: var(--text-sm); color: var(--color-dark-gray);">${s.number} • ${s.team}</div>
              </div>
              <span class="sticker-card-rarity rarity-${s.rarity}" style="flex-shrink: 0;">${s.rarity}</span>
            </div>
          </div>
        `).join('');
        searchResults.style.display = 'block';
      } else {
        searchResults.innerHTML = `
          <div style="padding: var(--space-lg); text-align: center; color: var(--color-dark-gray);">
            No stickers found matching "${query}"
          </div>
        `;
        searchResults.style.display = 'block';
      }
    }, 200));

    function selectSticker(id) {
      const sticker = catalogData.find(s => s.id === id);
      if (!sticker) return;

      document.getElementById('selectedStickerId').value = sticker.id;
      document.getElementById('selectedNumber').value = sticker.number;
      document.getElementById('selectedName').value = sticker.name;
      document.getElementById('selectedTeam').value = sticker.team;
      document.getElementById('selectedRarity').value = sticker.rarity;

      document.getElementById('previewNumber').textContent = sticker.number;
      document.getElementById('previewName').textContent = sticker.name;
      document.getElementById('previewTeam').textContent = sticker.team;
      document.getElementById('previewRarity').innerHTML = `
        <span class="sticker-card-rarity rarity-${sticker.rarity}">
          ${sticker.rarity === 'legendary' ? '★ ' : ''}${sticker.rarity}
        </span>
      `;

      document.getElementById('selectedSticker').classList.remove('hidden');
      searchResults.style.display = 'none';
      stickerSearch.value = `${sticker.number} - ${sticker.name}`;
    }

    function debounce(fn, delay) {
      let timeout;
      return (...args) => {
        clearTimeout(timeout);
        timeout = setTimeout(() => fn(...args), delay);
      };
    }

    // Form submission
    document.getElementById('addStickerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const stickerId = document.getElementById('selectedStickerId').value;

      if (!stickerId) {
        StickerSwap.Toast.error('Please select a sticker from the catalog', 'Validation Error');
        stickerSearch.focus();
        return;
      }

      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;

      try {
        const type = document.querySelector('input[name="type"]:checked').value;
        const quantity = type === 'duplicate' ? parseInt(document.getElementById('quantity').value) : 0;

        await StickerSwap.API.addSticker({
          number: document.getElementById('selectedNumber').value,
          name: document.getElementById('selectedName').value,
          team: document.getElementById('selectedTeam').value,
          rarity: document.getElementById('selectedRarity').value,
          type: type,
          quantity: quantity
        });

        StickerSwap.Toast.success('Sticker added to your collection!');
        
        setTimeout(() => {
          window.location.href = '/album.html';
        }, 1000);
      } catch (error) {
        StickerSwap.Toast.error(error.message || 'Failed to add sticker', 'Error');
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });

    // Close search results when clicking outside
    document.addEventListener('click', (e) => {
      if (!stickerSearch.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });

    // Load catalog on page load
    loadCatalog();
  </script>
</body>
</html>
