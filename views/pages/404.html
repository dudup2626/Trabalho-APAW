<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - StickerSwap 2026</title>
  <meta name="description" content="The page you are looking for does not exist.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="error-page">
    <!-- Illustration -->
    <svg width="300" height="240" viewBox="0 0 400 320" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom: var(--space-xl);">
      <!-- Background -->
      <circle cx="200" cy="160" r="120" fill="#f5f5f5"/>
      
      <!-- Album book -->
      <rect x="100" y="80" width="200" height="160" rx="8" fill="white" stroke="#e5e5e5" stroke-width="2"/>
      <line x1="200" y1="80" x2="200" y2="240" stroke="#e5e5e5" stroke-width="2"/>
      
      <!-- Missing sticker placeholder -->
      <rect x="125" y="105" width="55" height="75" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="2" stroke-dasharray="6 4"/>
      <text x="152" y="148" text-anchor="middle" fill="#bbb" font-size="24">?</text>
      
      <!-- Existing stickers -->
      <rect x="220" y="105" width="55" height="75" rx="4" fill="#ffd000"/>
      <rect x="125" y="195" width="55" height="30" rx="4" fill="#00c2ff"/>
      <rect x="220" y="170" width="55" height="55" rx="4" fill="#00d26a"/>
      
      <!-- Floating elements -->
      <circle cx="80" cy="60" r="20" fill="#ff4d00" fill-opacity="0.1"/>
      <circle cx="340" cy="100" r="15" fill="#00c2ff" fill-opacity="0.1"/>
      <circle cx="320" cy="250" r="25" fill="#00d26a" fill-opacity="0.1"/>
      
      <!-- 404 numbers -->
      <text x="155" y="60" fill="#ff4d00" font-size="48" font-weight="bold" font-family="system-ui">4</text>
      <text x="188" y="60" fill="#ffd000" font-size="48" font-weight="bold" font-family="system-ui">0</text>
      <text x="228" y="60" fill="#00c2ff" font-size="48" font-weight="bold" font-family="system-ui">4</text>
    </svg>
    
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-description">
      Oops! The page you're looking for seems to be missing from our album. 
      It might have been moved or doesn't exist.
    </p>
    
    <div style="display: flex; gap: var(--space-md); flex-wrap: wrap; justify-content: center;">
      <a href="/" class="btn btn-primary btn-lg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Back to Home
      </a>
      <a href="/catalog.html" class="btn btn-secondary btn-lg">
        Browse Catalog
      </a>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
