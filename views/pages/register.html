<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - StickerSwap 2026</title>
  <meta name="description" content="Create your free StickerSwap account and start trading FIFA World Cup 2026 stickers today.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <!-- Visual Side -->
    <div class="auth-visual">
      <div class="auth-visual-content">
        <h1 class="auth-visual-title">Join the Community</h1>
        <p class="auth-visual-description">
          Create your free account and start trading with collectors from around the world. Complete your album faster!
        </p>
        
        <!-- Illustration -->
        <svg class="auth-visual-illustration" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Background circles -->
          <circle cx="200" cy="150" r="130" fill="white" fill-opacity="0.1"/>
          <circle cx="80" cy="100" r="50" fill="white" fill-opacity="0.1"/>
          <circle cx="340" cy="180" r="60" fill="white" fill-opacity="0.1"/>
          
          <!-- World map representation -->
          <ellipse cx="200" cy="150" rx="100" ry="70" fill="white" fill-opacity="0.15"/>
          
          <!-- Connection lines -->
          <line x1="120" y1="120" x2="180" y2="140" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
          <line x1="220" y1="130" x2="280" y2="110" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
          <line x1="160" y1="180" x2="240" y2="170" stroke="white" stroke-opacity="0.5" stroke-width="2"/>
          
          <!-- User avatars -->
          <circle cx="120" cy="120" r="20" fill="white" fill-opacity="0.9"/>
          <text x="120" y="126" text-anchor="middle" fill="#ff4d00" font-size="16" font-weight="bold">A</text>
          
          <circle cx="280" cy="110" r="20" fill="white" fill-opacity="0.9"/>
          <text x="280" y="116" text-anchor="middle" fill="#00c2ff" font-size="16" font-weight="bold">B</text>
          
          <circle cx="180" cy="140" r="20" fill="white" fill-opacity="0.9"/>
          <text x="180" y="146" text-anchor="middle" fill="#00d26a" font-size="16" font-weight="bold">C</text>
          
          <circle cx="240" cy="170" r="20" fill="white" fill-opacity="0.9"/>
          <text x="240" y="176" text-anchor="middle" fill="#ffd000" font-size="16" font-weight="bold">D</text>
          
          <circle cx="160" cy="180" r="20" fill="white" fill-opacity="0.9"/>
          <text x="160" y="186" text-anchor="middle" fill="#ff4d00" font-size="16" font-weight="bold">E</text>
          
          <!-- Sticker elements -->
          <rect x="50" y="200" width="40" height="55" rx="6" fill="white" fill-opacity="0.9" transform="rotate(-20 70 227)"/>
          <rect x="310" y="50" width="40" height="55" rx="6" fill="white" fill-opacity="0.9" transform="rotate(15 330 77)"/>
          <rect x="320" y="220" width="40" height="55" rx="6" fill="white" fill-opacity="0.9" transform="rotate(-10 340 247)"/>
          
          <!-- Stars -->
          <path d="M40 60 L43 70 L53 70 L45 77 L48 87 L40 80 L32 87 L35 77 L27 70 L37 70 Z" fill="white" fill-opacity="0.5"/>
          <path d="M360 140 L363 150 L373 150 L365 157 L368 167 L360 160 L352 167 L355 157 L347 150 L357 150 Z" fill="white" fill-opacity="0.5"/>
        </svg>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="auth-form-container">
      <div class="auth-form-wrapper">
        <!-- Logo -->
        <a href="/" class="auth-logo">
          <div style="width: 44px; height: 44px; background: var(--gradient-primary); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 9h18M9 21V9"/>
            </svg>
          </div>
          StickerSwap 2026
        </a>
        
        <h2 class="auth-title">Create your account</h2>
        <p class="auth-subtitle">Join thousands of collectors worldwide</p>
        
        <!-- Register Form -->
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label class="form-label form-label-required" for="name">Full Name</label>
            <div class="input-group">
              <svg class="input-group-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <input 
                type="text" 
                id="name" 
                name="name" 
                class="form-input" 
                placeholder="John Doe"
                autocomplete="name"
                required
              >
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label form-label-required" for="email">Email Address</label>
            <div class="input-group">
              <svg class="input-group-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <input 
                type="email" 
                id="email" 
                name="email" 
                class="form-input" 
                placeholder="you@example.com"
                autocomplete="email"
                required
              >
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label-required" for="password">Password</label>
              <div class="input-group">
                <svg class="input-group-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input 
                  type="password" 
                  id="password" 
                  name="password" 
                  class="form-input" 
                  placeholder="••••••••"
                  autocomplete="new-password"
                  required
                >
              </div>
            </div>
            
            <div class="form-group">
              <label class="form-label form-label-required" for="confirmPassword">Confirm Password</label>
              <div class="input-group">
                <svg class="input-group-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input 
                  type="password" 
                  id="confirmPassword" 
                  name="confirmPassword" 
                  class="form-input" 
                  placeholder="••••••••"
                  autocomplete="new-password"
                  required
                >
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="city">City (Optional)</label>
            <div class="input-group">
              <svg class="input-group-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
              <input 
                type="text" 
                id="city" 
                name="city" 
                class="form-input" 
                placeholder="Your city"
                autocomplete="address-level2"
              >
            </div>
          </div>
          
          <div class="form-group" style="margin-bottom: 0;">
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;" id="submitBtn">
              Create Account
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>
          </div>
        </form>
        
        <p class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const form = e.target;
      
      // Validate
      const { isValid } = StickerSwap.Validation.validateForm(form, {
        name: ['required', (v) => v.length >= 2 || 'Name must be at least 2 characters'],
        email: ['required', 'email'],
        password: ['required', (v) => v.length >= 6 || 'Password must be at least 6 characters'],
        confirmPassword: ['required', (v) => v === form.password.value || 'Passwords do not match']
      });
      
      if (!isValid) return;
      
      // Show loading
      submitBtn.classList.add('btn-loading');
      submitBtn.disabled = true;
      
      try {
        const result = await StickerSwap.API.register({
          name: form.name.value,
          email: form.email.value,
          password: form.password.value,
          city: form.city.value
        });
        
        StickerSwap.Toast.success('Your account has been created!', 'Welcome to StickerSwap');
        
        setTimeout(() => {
          window.location.href = '/dashboard.html';
        }, 1500);
      } catch (error) {
        StickerSwap.Toast.error(error.message || 'Registration failed. Please try again.', 'Error');
        submitBtn.classList.remove('btn-loading');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
